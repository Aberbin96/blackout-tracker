name: 📉 Update Stability Scores

on:
  schedule:
    # Run daily at 12:45 AM (after the full scan)
    - cron: "45 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-stability:
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      matrix:
        chunk:
          - "--limit=4000 --offset=0"
          - "--limit=4000 --offset=4000"
          - "--limit=4000 --offset=8000"
          - "--limit=4000 --offset=12000"
          - "--limit=4000 --offset=16000"
          - "--limit=4000 --offset=20000"
          - "--limit=4000 --offset=24000"
          - "--limit=4000 --offset=28000"
          - "--limit=4000 --offset=32000"
          - "--limit=4000 --offset=36000"
      max-parallel: 10
      fail-fast: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --include=dev

      - name: Run Stability Analysis (Node 24)
        uses: ./.github/actions/blackout-action
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: 'analyze-stability'
          args: '${{ matrix.chunk }}'

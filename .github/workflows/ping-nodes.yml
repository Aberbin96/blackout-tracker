name: 📡 Ping Nodes (Cron)

on:
    schedule:
        # Run every 5 minutes to keep stats fresh and analyzer responsive
        - cron: "*/5 * * * *"
    workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
    ping-monitoring-nodes:
        runs-on: ubuntu-latest
        environment: Production
        strategy:
            matrix:
                # Uniform chunks of 2,500 nodes to balance execution time
                chunk:
                    - "--limit=2500 --offset=0"
                    - "--limit=2500 --offset=2500"
                    - "--limit=2500 --offset=5000"
                    - "--limit=2500 --offset=7500"
                    - "--limit=2500 --offset=10000"
                    - "--limit=2500 --offset=12500"
                    - "--limit=2500 --offset=15000"
                    - "--limit=2500 --offset=17500"
                    - "--limit=2500 --offset=20000"
                    - "--limit=2500 --offset=22500"
                    - "--limit=2500 --offset=25000"
                    - "--limit=2500 --offset=27500"
                    - "--limit=2500 --offset=30000"
                    - "--limit=2500 --offset=32500"
                    - "--limit=2500 --offset=35000"
                    - "--limit=2500 --offset=37500"
            max-parallel: 10 # Control total concurrency
            fail-fast: false
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Dependencies
              run: npm install --include=dev

            - name: Run Monitoring Worker
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.SUPABASE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
                  API_CHECK_URL: ${{ vars.API_CHECK_URL || secrets.API_CHECK_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
              run: |
                  echo "--- Running Monitor for Chunk: ${{ matrix.chunk }} ---"
                  npx tsx scripts/monitor-ips.ts ${{ matrix.chunk }}

name: 📡 Ping Nodes (Cron)

on:
    schedule:
        # Run every 5 minutes to keep stats fresh and analyzer responsive
        - cron: "*/5 * * * *"
    workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
    ping-monitoring-nodes:
        runs-on: ubuntu-latest
        environment: Production
        strategy:
            matrix:
                # Individual jobs for high-density states, grouped for tiny ones
                state: [
                    "distrito federal", 
                    "miranda", 
                    "carabobo", 
                    "zulia", 
                    "tachira", 
                    "aragua", 
                    "lara", 
                    "anzoategui", 
                    "merida", 
                    "vargas", 
                    "bolivar", 
                    "estado trujillo", 
                    "portuguesa", 
                    "barinas", 
                    "nueva esparta", 
                    "guarico", 
                    "apure",
                    "monagas,amazonas,delta amacuro,sucre,falcon,yaracuy,cojedes,dependencias federales"
                ]
            max-parallel: 10 # Control total concurrency
            fail-fast: false
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Dependencies
              run: npm install --include=dev

            - name: Run Monitoring Worker
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.SUPABASE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
                  API_CHECK_URL: ${{ vars.API_CHECK_URL || secrets.API_CHECK_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
              run: |
                  IFS=',' read -ra ADDR <<< "${{ matrix.state }}"
                  for state in "${ADDR[@]}"; do
                    echo "--- Pinging $state ---"
                    npx tsx scripts/monitor-ips.ts --state="$state"
                  done

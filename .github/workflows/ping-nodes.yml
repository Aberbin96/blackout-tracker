name: 📡 Ping Nodes (Cron)

on:
    schedule:
        # Run every 5 minutes to keep stats fresh and analyzer responsive
        - cron: "*/5 * * * *"
    workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
    ping-monitoring-nodes:
        runs-on: ubuntu-latest
        environment: Production
        strategy:
            matrix:
                # Grouping states into fewer jobs to avoid overhead and maximize concurrency inside the script
                group: [1, 2, 3]
            max-parallel: 3
            fail-fast: false
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Dependencies
              run: npm install --include=dev

            - name: Stagger Execution
              run: sleep $(( (RANDOM % 30) ))

            - name: Run Monitoring Worker
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.SUPABASE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
                  API_CHECK_URL: ${{ vars.API_CHECK_URL || secrets.API_CHECK_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
              run: |
                  # We divide the work by state index roughly
                  case ${{ matrix.group }} in
                    1) STATES="zulia,miranda,distrito federal,carabobo,aragua,vargas" ;;
                    2) STATES="lara,anzoategui,bolivar,monagas,barinas,portuguesa" ;;
                    3) STATES="tachira,merida,trujillo,nueva esparta,apure,amazonas,falcon,yaracuy,cojedes,guarico,sucre,delta amacuro" ;;
                  esac

                  echo "Processing states: $STATES"
                  
                  # Loop through states in this group
                  IFS=',' read -ra ADDR <<< "$STATES"
                  for state in "${ADDR[@]}"; do
                    echo "--- Pinging $state ---"
                    npx tsx scripts/monitor-ips.ts --state="$state"
                  done

name: 📡 Ping Nodes (Daily Full Scan)

on:
    schedule:
        # Run daily at midnight to refresh all nodes
        - cron: "0 0 * * *"
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    ping-monitoring-nodes:
        runs-on: ubuntu-latest
        environment: Production
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        strategy:
            matrix:
                # Uniform chunks of 2,500 nodes to balance execution time
                chunk:
                    - "--limit=2500 --offset=0"
                    - "--limit=2500 --offset=2500"
                    - "--limit=2500 --offset=5000"
                    - "--limit=2500 --offset=7500"
                    - "--limit=2500 --offset=10000"
                    - "--limit=2500 --offset=12500"
                    - "--limit=2500 --offset=15000"
                    - "--limit=2500 --offset=17500"
                    - "--limit=2500 --offset=20000"
                    - "--limit=2500 --offset=22500"
                    - "--limit=2500 --offset=25000"
                    - "--limit=2500 --offset=27500"
                    - "--limit=2500 --offset=30000"
                    - "--limit=2500 --offset=32500"
                    - "--limit=2500 --offset=35000"
                    - "--limit=2500 --offset=37500"
            max-parallel: 10 # Control total concurrency
            fail-fast: false
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Install Dependencies
              run: npm install --include=dev

            - name: Run Monitoring Worker
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  API_CHECK_URL: ${{ secrets.API_CHECK_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
                  MIN_STABILITY_SCORE: 0
              run: |
                  echo "--- Running Monitor for Chunk: ${{ matrix.chunk }} ---"
                  npx tsx scripts/monitor-ips.ts ${{ matrix.chunk }}

name: 🧹 Monthly Prefix Reset

on:
  schedule:
    # Run at 1:00 AM on the 1st of every month
    - cron: "0 1 1 * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reset-prefixes:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --include=dev

      - name: Clear Scanned Prefixes Table
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "--- Resetting scanned_prefixes to start a new discovery cycle ---"
          npm run discover -- --reset-prefixes --limit-prefixes=0

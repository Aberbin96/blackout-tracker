name: ⚡ Ping Nodes (Frequent - High Reliability)

on:
    schedule:
        # Run every 30 minutes from 1:00 AM to 11:30 PM
        - cron: "0,30 1-23 * * *"
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    ping-frequent:
        runs-on: ubuntu-latest
        environment: Production
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Install Dependencies
              run: npm install --include=dev

            - name: Run Frequent Monitoring
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  API_CHECK_URL: ${{ secrets.API_CHECK_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
                  MIN_STABILITY_SCORE: ${{ secrets.MIN_STABILITY_SCORE || 10 }}
              run: |
                  echo "--- Running Fast Monitoring for Stable Nodes ---"
                  # No chunks/matrix needed as we only check high-reliability nodes
                  npx tsx scripts/monitor-ips.ts

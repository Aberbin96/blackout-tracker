name: ⚡ Ping Nodes (Frequent - High Reliability)

on:
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    ping-frequent:
        runs-on: ubuntu-latest
        environment: Production
        strategy:
            matrix:
                chunk:
                    - "--limit=1000 --offset=0"
                    - "--limit=1000 --offset=1000"
                    - "--limit=1000 --offset=2000"
                    - "--limit=1000 --offset=3000"
                    - "--limit=1000 --offset=4000"
                    - "--limit=1000 --offset=5000"
                    - "--limit=1000 --offset=6000"
                    - "--limit=1000 --offset=7000"
                    - "--limit=1000 --offset=8000"
                    - "--limit=1000 --offset=9000"
                    - "--limit=1000 --offset=10000"
                    - "--limit=1000 --offset=11000"
                    - "--limit=1000 --offset=12000"
                    - "--limit=1000 --offset=13000"
                    - "--limit=1000 --offset=14000"
                    - "--limit=1000 --offset=15000"
                    - "--limit=1000 --offset=16000"
                    - "--limit=1000 --offset=17000"
                    - "--limit=1000 --offset=18000"
                    - "--limit=1000 --offset=19000"
                    - "--limit=1000 --offset=20000"
                    - "--limit=1000 --offset=21000"
                    - "--limit=1000 --offset=22000"
                    - "--limit=1000 --offset=23000"
                    - "--limit=1000 --offset=24000"
            max-parallel: 25
            fail-fast: false
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Install Dependencies
              run: npm install --include=dev

            - name: Run Frequent Monitoring (Node 24)
              uses: ./.github/actions/blackout-action
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  API_CHECK_URL: ${{ secrets.API_CHECK_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
                  MIN_STABILITY_SCORE: ${{ secrets.MIN_STABILITY_SCORE || 10 }}
              with:
                  script: 'monitor-ips'
                  args: '${{ matrix.chunk }}'
